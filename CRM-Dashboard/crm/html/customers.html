<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kresola — Customers</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="customers">
<div class="app-shell">
  <div id="sidebar-root"></div>

  <main class="main">
    <div class="mobile-topbar">
      <button class="icon-btn" data-toggle-sidebar>☰</button>
      <div class="brand-name" style="color:var(--text);font-weight:600;">Kresola</div>
    </div>

    <div class="topbar">
      <div class="greeting">
        <h1>Customers</h1>
        <p>48 customers across every plan and status.</p>
      </div>
      <div class="topbar-actions">
        <div class="avatar" data-avatar-initials>ME</div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="search-box"><span id="search-icon"></span><input type="text" id="cust-search" placeholder="Search by name, email or company…"></div>
        <select class="select" id="status-filter">
          <option value="">All statuses</option>
          <option>Active</option>
          <option>Pending</option>
          <option>Inactive</option>
        </select>
        <select class="select" id="plan-filter">
          <option value="">All plans</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="sortable" data-sort="name">Customer <span class="sort-arrow">↕</span></th>
              <th class="sortable" data-sort="company">Company <span class="sort-arrow">↕</span></th>
              <th class="sortable" data-sort="plan">Plan <span class="sort-arrow">↕</span></th>
              <th class="sortable" data-sort="spend">Spend <span class="sort-arrow">↕</span></th>
              <th class="sortable" data-sort="joined">Joined <span class="sort-arrow">↕</span></th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="cust-tbody"></tbody>
        </table>
      </div>
      <div id="cust-empty" class="empty-state" style="display:none;"></div>

      <div class="pagination">
        <span id="cust-count"></span>
        <div class="page-btns" id="cust-pages"></div>
      </div>
    </div>
  </main>
</div>

<script src="js/icons.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/data.js"></script>
<script src="js/customers.js"></script>
</body>
</html>
