<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kresola — Orders</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="orders">
<div class="app-shell">
  <div id="sidebar-root"></div>

  <main class="main">
    <div class="mobile-topbar">
      <button class="icon-btn" data-toggle-sidebar>☰</button>
      <div class="brand-name" style="color:var(--text);font-weight:600;">Kresola</div>
    </div>

    <div class="topbar">
      <div class="greeting">
        <h1>Orders</h1>
        <p>Track, update and manage every customer order.</p>
      </div>
      <div class="topbar-actions">
        <div class="avatar" data-avatar-initials>ME</div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="search-box"><span id="search-icon"></span><input type="text" id="order-search" placeholder="Search by order ID or customer…"></div>
        <select class="select" id="order-status-filter">
          <option value="">All statuses</option>
          <option>Delivered</option>
          <option>Processing</option>
          <option>Pending</option>
          <option>Cancelled</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="sortable" data-sort="id">Order ID <span class="sort-arrow">↕</span></th>
              <th class="sortable" data-sort="customer">Customer <span class="sort-arrow">↕</span></th>
              <th class="sortable" data-sort="date">Date <span class="sort-arrow">↕</span></th>
              <th class="sortable" data-sort="amount">Amount <span class="sort-arrow">↕</span></th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="order-tbody"></tbody>
        </table>
      </div>
      <div id="order-empty" class="empty-state" style="display:none;"></div>

      <div class="pagination">
        <span id="order-count"></span>
        <div class="page-btns" id="order-pages"></div>
      </div>
    </div>
  </main>
</div>

<!-- Edit status modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Update order status</h3>
    <p id="edit-modal-sub">Choose a new status for this order.</p>
    <div class="field">
      <label for="edit-status-select">Status</label>
      <select class="select" id="edit-status-select" style="width:100%;">
        <option>Pending</option>
        <option>Processing</option>
        <option>Delivered</option>
        <option>Cancelled</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="edit-cancel">Cancel</button>
      <button class="btn btn-primary" id="edit-save">Save changes</button>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>Delete this order?</h3>
    <p id="delete-modal-sub">This action can't be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="delete-cancel">Cancel</button>
      <button class="btn btn-danger" id="delete-confirm">Delete order</button>
    </div>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/data.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
