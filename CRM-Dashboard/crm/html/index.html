<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kresola — Sign in</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-mark" style="background:#0a0a0b;color:#fff;">K</div>
      <div style="font-weight:600;font-size:15px;">Kresola</div>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to view your business overview and manage your team.</p>

    <form id="login-form" novalidate>
      <div class="field" id="email-field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="username">
        <span class="error-msg">Enter a valid email address.</span>
      </div>

      <div class="field" id="password-field">
        <label for="password">Password</label>
        <div class="input-icon-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <button type="button" class="input-icon-btn" id="toggle-password" aria-label="Show password"></button>
        </div>
        <span class="error-msg">Password must be at least 6 characters.</span>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin:2px 0 20px;">
        <label class="checkbox-row"><input type="checkbox" id="remember-me"> Remember me</label>
        <a href="#" class="no-sound" style="font-size:12.5px;color:var(--text-muted);" id="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign in</button>
    </form>

    <div class="auth-divider">demo access</div>
    <p style="font-size:12px;color:var(--text-muted);text-align:center;margin:0;">
      Use any email + a 6+ character password — this is a static demo, there's no real backend.
    </p>
  </div>
</div>

<script src="js/icons.js"></script>
<script src="js/app.js"></script>
<script>
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const emailField = document.getElementById('email-field');
  const passwordField = document.getElementById('password-field');
  const toggleBtn = document.getElementById('toggle-password');
  const rememberBox = document.getElementById('remember-me');

  // Restore "remember me" email
  const rememberedEmail = localStorage.getItem('kresola_remember_email');
  if(rememberedEmail){ emailInput.value = rememberedEmail; rememberBox.checked = true; }

  toggleBtn.innerHTML = Icon('eye');
  let visible = false;
  toggleBtn.addEventListener('click', () => {
    visible = !visible;
    passwordInput.type = visible ? 'text' : 'password';
    toggleBtn.innerHTML = Icon(visible ? 'eye-off' : 'eye');
  });

  function validEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    let ok = true;
    if(!validEmail(emailInput.value.trim())){ emailField.classList.add('invalid'); ok = false; }
    else emailField.classList.remove('invalid');

    if(passwordInput.value.length < 6){ passwordField.classList.add('invalid'); ok = false; }
    else passwordField.classList.remove('invalid');

    if(!ok){ Kresola.sound.error(); Kresola.toast('Please fix the highlighted fields'); return; }

    if(rememberBox.checked) localStorage.setItem('kresola_remember_email', emailInput.value.trim());
    else localStorage.removeItem('kresola_remember_email');

    // Seed a friendly profile the first time so Settings/Dashboard have something to show.
    if(!localStorage.getItem('kresola_profile')){
      const name = emailInput.value.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      localStorage.setItem('kresola_profile', JSON.stringify({name, email: emailInput.value.trim(), phone:'', bio:''}));
    }

    sessionStorage.setItem('kresola_auth', '1');
    Kresola.sound.success();
    const btn = document.getElementById('login-btn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 450);
  });

  document.getElementById('forgot-link').addEventListener('click', (e) => {
    e.preventDefault();
    Kresola.toast('This is a static demo — password reset is not wired up.');
  });

  // If already signed in, skip straight to the dashboard.
  if(sessionStorage.getItem('kresola_auth')){ window.location.href = 'dashboard.html'; }
</script>
</body>
</html>
